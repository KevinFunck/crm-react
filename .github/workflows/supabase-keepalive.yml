name: Supabase Keepalive

on:
  schedule:
    - cron: "0 10 * * *"   # täglich um 10:00 UTC
  workflow_dispatch:         # manuell auslösbar im GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Insert new keepalive record
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/keepalive" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Delete records older than 2 days
        run: |
          curl -s -X DELETE "${{ secrets.SUPABASE_URL }}/rest/v1/keepalive?created_at=lt.$(date -u -d '2 days ago' '+%Y-%m-%dT%H:%M:%SZ')" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}"
